name: Annotation Processor Validation

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'hermes-processor/**'
      - 'hermes-api/**'
      - 'hermes-examples/**'
      - '.github/workflows/annotation-processor.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'hermes-processor/**'
      - 'hermes-api/**'
      - 'hermes-examples/**'
      - '.github/workflows/annotation-processor.yml'

jobs:
  validate-processor:
    name: Validate @InjectLogger Annotation Processing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Build annotation processor
        run: mvn clean install -pl hermes-api,hermes-processor -am -B -V
        env:
          MAVEN_OPTS: -Xmx1024m
      
      - name: Build examples (triggers annotation processing)
        run: mvn clean compile -pl hermes-examples -am -B
        env:
          MAVEN_OPTS: -Xmx1024m
      
      - name: Check for generated sources
        run: |
          echo "Checking for generated annotation processor sources..."
          if [ -d "hermes-examples/target/generated-sources/annotations" ]; then
            echo "✓ Generated sources directory exists"
            find hermes-examples/target/generated-sources/annotations -type f -name "*.java" | head -10
            file_count=$(find hermes-examples/target/generated-sources/annotations -type f -name "*.java" | wc -l)
            echo "Found $file_count generated Java files"
            if [ "$file_count" -gt 0 ]; then
              echo "✓ Annotation processor successfully generated sources"
              exit 0
            else
              echo "✗ No Java files generated by annotation processor"
              exit 1
            fi
          else
            echo "⚠ No generated sources directory found - this is OK if examples don't use @InjectLogger yet"
            exit 0
          fi
      
      - name: Upload generated sources
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: |
            **/target/generated-sources/annotations/**/*.java
          retention-days: 7
